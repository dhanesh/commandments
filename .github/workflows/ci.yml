# CI pipeline for engineering-commandments plugin
# Satisfies: T4, T5, O1, O2 (RT-4.1, RT-4.2, RT-4.3, RT-4.4)
name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint all shell scripts
        run: shellcheck hooks/scripts/*.sh

  validate-json:
    name: Validate JSON configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin.json
        run: python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
      - name: Validate hooks.json
        run: python3 -c "import json; json.load(open('hooks/hooks.json'))"
      - name: Validate marketplace.json
        run: python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"

  test:
    name: Bats tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Run bats tests
        run: ./tests/bats/bin/bats tests/
